<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Molecular helix / pill shape inspired by Pfizer aesthetic -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4d7cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Voxel cube mark -->
  <g transform="translate(8, 10)">
    <!-- Back face -->
    <path d="M20 8 L35 0 L35 20 L20 28 Z" fill="#4d7cff" opacity="0.6"/>
    <!-- Top face -->
    <path d="M5 0 L20 8 L35 0 L20 -8 Z" transform="translate(0,8)" fill="#00f0ff" opacity="0.8"/>
    <!-- Front face -->
    <path d="M5 8 L20 16 L20 36 L5 28 Z" fill="url(#grad1)" opacity="0.9"/>
    <!-- Inner voxel accent -->
    <path d="M12 14 L20 18 L20 28 L12 24 Z" fill="#39ff14" opacity="0.5"/>
    <!-- Helix curve wrapping the cube -->
    <path d="M 2 35 Q 18 42, 37 35" stroke="url(#grad2)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="2" cy="35" r="2" fill="#00f0ff"/>
    <circle cx="37" cy="35" r="2" fill="#39ff14"/>
  </g>
  
  <!-- VoxelTox text -->
  <text x="52" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="-0.5">
    <tspan>Voxel</tspan><tspan fill="url(#grad2)">Tox</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="52" y="47" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" fill="#888" letter-spacing="2.5" font-weight="400">
    SPATIAL INTELLIGENCE
  </text>
</svg>
