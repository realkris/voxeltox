<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4d7cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Voxel cube -->
  <g transform="translate(8, 4)">
    <!-- Back face -->
    <path d="M16 8 L32 0 L32 22 L16 30 Z" fill="#4d7cff" opacity="0.6"/>
    <!-- Top face -->
    <path d="M0 8 L16 16 L32 8 L16 0 Z" fill="#00f0ff" opacity="0.8"/>
    <!-- Front face -->
    <path d="M0 8 L16 16 L16 38 L0 30 Z" fill="url(#g1)" opacity="0.9"/>
    <!-- Inner voxel highlight -->
    <path d="M6 15 L16 20 L16 30 L6 25 Z" fill="#39ff14" opacity="0.4"/>
  </g>
  <!-- Helix curve -->
  <path d="M 6 40 Q 24 48, 42 40" stroke="url(#g2)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="6" cy="40" r="2.5" fill="#00f0ff"/>
  <circle cx="42" cy="40" r="2.5" fill="#39ff14"/>
</svg>
